<div class="flex h-screen bg-slate-50">
  <!-- ======= SIDEBAR ======= -->
  <aside class="flex flex-col w-60 xl:w-64 bg-slate-950 shrink-0">
    <!-- Logo -->
    <div class="flex items-center gap-3 px-5 py-5 border-b border-slate-800">
      <div class="w-8 h-8 rounded-full bg-indigo-600 flex items-center justify-center shrink-0">
        <span class="text-white text-sm font-bold">
          <img class="rounded-full" src="logo_battilana.jpg" />
        </span>
      </div>
      <div class="leading-tight">
        <p class="text-white font-semibold text-sm tracking-wide">OnePage</p>
        <p class="text-slate-500 text-xs">Battilana</p>
      </div>
    </div>

    <!-- Nav -->
    <nav class="flex-1 px-3 py-4 overflow-y-hidden space-y-0.5 text-sm">
      <p class="px-3 pb-2 text-xs font-semibold text-slate-500 uppercase tracking-wider">General</p>

      <a
        routerLink=""
        routerLinkActive="nav-link-active"
        [routerLinkActiveOptions]="{ exact: true }"
        class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-slate-400 hover:bg-slate-800 hover:text-white transition-colors cursor-pointer"
      >
        <svg lucideHome class="w-4 h-4 shrink-0"></svg>
        <span>Inicio</span>
      </a>

      <div class="pt-3 pb-1">
        <p class="px-3 pb-2 text-xs font-semibold text-slate-500 uppercase tracking-wider">
          Gestiones
        </p>
      </div>

      <!-- Primera Gestión -->
      <div>
        <button
          (click)="primeraGestion = !primeraGestion"
          class="flex items-center gap-3 w-full px-3 py-2.5 rounded-lg text-slate-400 hover:bg-slate-800 hover:text-white transition-colors"
        >
          <svg lucideFileText class="w-4 h-4 shrink-0"></svg>
          <span class="flex-1 text-left">Gestion pedidos</span>
          <svg
            lucideChevronDown
            class="w-4 h-4 transition-transform duration-200"
            [class.rotate-180]="primeraGestion"
          ></svg>
        </button>
        @if (primeraGestion) {
          <div class="mt-1 ml-4 pl-3 border-l border-slate-700 space-y-0.5">
            <a
              routerLink="/pedido-diario"
              routerLinkActive="nav-sub-active"
              class="flex items-center px-3 py-2 rounded-md text-slate-400 hover:bg-slate-800 hover:text-white transition-colors cursor-pointer"
            >
              Pedidos Diarios
            </a>
            <a
              routerLink="/lote-pedido"
              routerLinkActive="nav-sub-active"
              class="flex items-center px-3 py-2 rounded-md text-slate-400 hover:bg-slate-800 hover:text-white transition-colors cursor-pointer"
            >
              Envíos WhatsApp
            </a>
            <a
              routerLink="/historial-envios"
              routerLinkActive="nav-sub-active"
              class="flex items-center px-3 py-2 rounded-md text-slate-400 hover:bg-slate-800 hover:text-white transition-colors cursor-pointer"
            >
              Historial envios
            </a>
          </div>
        }
      </div>

      <!-- Segunda Gestión -->
      <div>
        <button
          (click)="segundaGestion = !segundaGestion"
          class="flex items-center gap-3 w-full px-3 py-2.5 rounded-lg text-slate-400 hover:bg-slate-800 hover:text-white transition-colors"
        >
          <svg lucideFileText class="w-4 h-4 shrink-0"></svg>
          <span class="flex-1 text-left">Gestion de Dietario</span>
          <svg
            lucideChevronDown
            class="w-4 h-4 transition-transform duration-200"
            [class.rotate-180]="segundaGestion"
          ></svg>
        </button>
        @if (segundaGestion) {
          <div class="mt-1 ml-4 pl-3 border-l border-slate-700 space-y-0.5">
            <a
              routerLink="/facturas-canceladas"
              class="flex items-center px-3 py-2 rounded-md text-slate-400 hover:bg-slate-800 hover:text-white transition-colors cursor-pointer"
            >
              Fac y Let Canceladas
            </a>
            <a
              hidden
              class="flex items-center px-3 py-2 rounded-md text-slate-400 hover:bg-slate-800 hover:text-white transition-colors cursor-pointer"
            >
              Sub gestión 2
            </a>
          </div>
        }
      </div>

      <!-- Tercera Gestión -->
      <div hidden>
        <button
          (click)="terceraGestion = !terceraGestion"
          class="flex items-center gap-3 w-full px-3 py-2.5 rounded-lg text-slate-400 hover:bg-slate-800 hover:text-white transition-colors"
        >
          <svg lucideFileText class="w-4 h-4 shrink-0"></svg>
          <span class="flex-1 text-left">Tercera Gestión</span>
          <svg
            lucideChevronDown
            class="w-4 h-4 transition-transform duration-200"
            [class.rotate-180]="terceraGestion"
          ></svg>
        </button>
        @if (terceraGestion) {
          <div class="mt-1 ml-4 pl-3 border-l border-slate-700 space-y-0.5">
            <a
              class="flex items-center px-3 py-2 rounded-md text-slate-400 hover:bg-slate-800 hover:text-white transition-colors cursor-pointer"
            >
              Sub gestión 1
            </a>
            <a
              class="flex items-center px-3 py-2 rounded-md text-slate-400 hover:bg-slate-800 hover:text-white transition-colors cursor-pointer"
            >
              Sub gestión 2
            </a>
          </div>
        }
      </div>
    </nav>

    <!-- Footer del sidebar -->
    <div class="px-4 py-4 border-t border-slate-800">
      <div class="flex items-center gap-3">
        <div class="w-8 h-8 rounded-full bg-indigo-900 flex items-center justify-center shrink-0">
          <svg lucideUser class="w-4 h-4 text-indigo-300"></svg>
        </div>
        <div class="flex-1 min-w-0">
          <p class="text-sm font-medium text-slate-200 truncate">Admin</p>
          <p class="text-xs text-slate-500 truncate">Battilana © 2026</p>
        </div>
        <button
          class="p-1.5 rounded-lg text-slate-500 hover:text-slate-300 hover:bg-slate-800 transition-colors"
        >
          <svg lucideLogOut class="w-4 h-4"></svg>
        </button>
      </div>
    </div>
  </aside>

  <!-- ======= MAIN ======= -->
  <div class="flex-1 flex flex-col min-w-0">
    <!-- Top Navbar -->
    <header
      class="h-14 bg-white border-b border-slate-200 flex items-center justify-between px-6 shrink-0 shadow-sm"
    >
      <div class="flex items-center gap-2 text-sm">
        <span hidden class="text-slate-400 hidden sm:block">OnePage</span>
        <span hidden class="text-slate-300 hidden sm:block">/</span>
        <span hidden class="text-slate-700 font-semibold">Panel Contable</span>
      </div>
      <div class="flex items-center gap-1">
        <button
          hidden
          class="p-2 rounded-lg text-slate-400 hover:text-slate-600 hover:bg-slate-100 transition-colors"
        >
          <svg lucideSearch class="w-4 h-4"></svg>
        </button>
        <button
          hidden
          class="relative p-2 rounded-lg text-slate-400 hover:text-slate-600 hover:bg-slate-100 transition-colors"
        >
          <svg lucideBell class="w-4 h-4"></svg>
          <span
            class="absolute top-1.5 right-1.5 w-2 h-2 bg-indigo-500 rounded-full border-2 border-white"
          ></span>
        </button>
        <div class="w-px h-6 bg-slate-200 mx-2"></div>
        <button
          class="flex items-center gap-2 px-2 py-1.5 rounded-lg hover:bg-slate-100 transition-colors"
        >
          <div class="w-7 h-7 rounded-full bg-indigo-100 flex items-center justify-center">
            <svg lucideUser class="w-4 h-4 text-indigo-600"></svg>
          </div>
          <span class="text-sm font-medium text-slate-700 hidden sm:block">Admin</span>
        </button>
      </div>
    </header>

    <!-- Contenido -->
    <main class="flex-1 overflow-auto bg-slate-50">
      <div
        class="w-full max-w-[1400px] xl:max-w-[1500px] 2xl:max-w-[1700px] mx-auto p-4 xl:p-6 2xl:p-8"
      >
        <router-outlet></router-outlet>
      </div>
    </main>
  </div>
</div>
